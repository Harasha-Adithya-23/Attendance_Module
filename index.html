<!DOCTYPE html>
<html>
<head>
    <title>A600 Attendance System</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        button {
            width: 160px;
            height: 70px;
            font-size: 16px;
            margin: 4px;
        }

        table {
            margin: auto;
        }

        label {
            font-size: 16px;
        }

        #userid {
            width: 60px;
            font-size: 16px;
            text-align: center;
        }

        #status {
            font-family: monospace;
            font-size: 13px;
            white-space: pre;
            min-height: 16px;
        }

        textarea {
            width: 500px;
            height: 300px;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <h1>A600 Attendance System</h1>

    <p>
        <label for="userid">User ID (0 to 63):</label>
        <input type="number" id="userid" min="0" max="63" value="0">
    </p>

    <br>

    <table>
        <tr>
            <td><button id="plcbtn">Place Finger</button></td>
            <td><button id="enrollbtn">Enroll Finger</button></td>
            <td><button id="removebtn">Remove Finger</button></td>
        </tr>
        <tr>
            <td><button id="endday">End Day</button></td>
            <td><button id="reset">Reset CSV</button></td>
            <td><button id="clear">Clear Log</button></td>
        </tr>
    </table>

    <br>

    <h3>Enrolled Users</h3>
    <pre id="status">Loading...</pre>

    <h3>Activity Log</h3>
    <textarea id="logarea" readonly></textarea>

    <script src="app.js"></script>
</body>
</html>
